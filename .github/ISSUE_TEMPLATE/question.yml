name: Question
description: Ask a question about Claude Code Toolbox
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        Before asking, you may find your answer in the existing documentation:

        - [README](https://github.com/alex-feel/claude-code-toolbox#readme) -- Overview and quick start
        - [Environment Configuration Guide](https://github.com/alex-feel/claude-code-toolbox/blob/main/docs/environment-configuration-guide.md) -- Complete YAML configuration reference
        - [Installing Claude Code](https://github.com/alex-feel/claude-code-toolbox/blob/main/docs/installing-claude-code.md) -- Installation methods and troubleshooting

  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe your question in detail. Include what you are trying to achieve and any relevant context.
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: Topic Area
      description: What area does your question relate to?
      options:
        - Installation/Setup
        - YAML Configuration
        - MCP Server Setup
        - Hooks
        - Agents/Slash Commands/Rules/Skills
        - Cross-platform Issues
        - Shell Integration
        - Other
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What I've Tried
      description: Describe what you have already tried or investigated. This helps avoid suggesting things you already know.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, code snippets, or configuration details that may help answer your question.
